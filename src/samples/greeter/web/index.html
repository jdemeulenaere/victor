<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Victor Greeter</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        background: #f5f6f8;
        color: #111;
      }

      #root {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(640px, 100%);
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 20px;
      }

      form {
        margin-top: 16px;
        display: flex;
        gap: 8px;
      }

      input,
      button {
        font: inherit;
        padding: 8px 10px;
        border: 1px solid #bbb;
        border-radius: 6px;
      }

      input {
        flex: 1;
      }

      button {
        background: #111;
        color: #fff;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.7;
        cursor: default;
      }

      pre {
        margin: 14px 0 0;
        padding: 10px;
        border-radius: 6px;
        background: #f0f2f4;
        white-space: pre-wrap;
      }

      .error {
        color: #9a1f1f;
        background: #fbe9e9;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
