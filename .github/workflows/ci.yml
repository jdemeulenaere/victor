name: CI

on:
  pull_request:
  push:

jobs:
  build_test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}
          repository-cache: true
      - run: ./build.sh
      - run: ./test.sh

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build_test
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}
          repository-cache: true
      - id: deploy_config
        name: Load deploy config
        run: bazel run //tools/deploy:emit_github_actions_outputs -- --config tools/deploy/dev_environment.json --github-output "$GITHUB_OUTPUT"
      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ steps.deploy_config.outputs.gcp_project_id }}
          workload_identity_provider: ${{ steps.deploy_config.outputs.workload_identity_provider }}
          service_account: ${{ steps.deploy_config.outputs.service_account }}
      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ steps.deploy_config.outputs.gcp_project_id }}
          version: ">= 416.0.0"
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: Install Firebase CLI
        run: npm install --global firebase-tools@latest
      - name: Deploy registered targets
        run: |
          set -euo pipefail
          for kind in grpc_server web_app android_app; do
            while IFS= read -r target; do
              if [[ -z "$target" ]]; then
                continue
              fi
              echo "Deploying $target"
              bazel run "$target"
            done < <(bazel run //tools/deploy:list_deploy_targets -- --kind "$kind")
          done
