name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
      - name: Build
        run: bazel build --config=ci //...
      - name: Test
        run: bazel test --config=ci //...

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build_test
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
      - id: deploy_config
        name: Load deploy config
        run: bazel run --config=ci //build/deploy:emit_github_actions_outputs -- --config build/deploy/dev_environment.json --github-output "$GITHUB_OUTPUT"
      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ steps.deploy_config.outputs.gcp_project_id }}
          workload_identity_provider: ${{ steps.deploy_config.outputs.workload_identity_provider }}
          service_account: ${{ steps.deploy_config.outputs.service_account }}
      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ steps.deploy_config.outputs.gcp_project_id }}
          version: ">= 416.0.0"
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: Install Firebase CLI
        run: npm install --global firebase-tools@latest
      - name: Deploy registered targets
        run: |
          set -euo pipefail
          for kind in grpc_server web_app android_app; do
            while IFS= read -r target; do
              if [[ -z "$target" ]]; then
                continue
              fi
              echo "Deploying $target"
              bazel run --config=ci "$target"
            done < <(bazel run --config=ci //build/deploy:list_deploy_targets -- --kind "$kind")
          done
