name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format_check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
      - name: Check formatting for PR files
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          mapfile -t changed_files < <(git diff --name-only --diff-filter=ACMR "${PR_BASE_SHA}...HEAD")
          if [[ ${#changed_files[@]} -eq 0 ]]; then
            echo "No PR files to format-check."
            exit 0
          fi

          ./.github/scripts/run-bazel-ci.sh run --config=ci //:format_check -- -- "${changed_files[@]}"

  build_test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
      - name: Build
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: ./.github/scripts/run-bazel-ci.sh build --config=ci //...
      - name: Test
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: ./.github/scripts/run-bazel-ci.sh test --config=ci //...

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build_test
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
      - id: deploy_config
        name: Load deploy config
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: ./.github/scripts/run-bazel-ci.sh run --config=ci //build/deploy:emit_github_actions_outputs -- --config build/deploy/dev_environment.json --github-output "$GITHUB_OUTPUT"
      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ steps.deploy_config.outputs.gcp_project_id }}
          workload_identity_provider: ${{ steps.deploy_config.outputs.workload_identity_provider }}
          service_account: ${{ steps.deploy_config.outputs.service_account }}
      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ steps.deploy_config.outputs.gcp_project_id }}
          version: ">= 416.0.0"
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: Install Firebase CLI
        run: npm install --global firebase-tools@latest
      - name: Deploy gRPC server targets
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
          DEPLOY_KIND: grpc_server
        run: |
          set -euo pipefail
          while IFS= read -r target; do
            if [[ -z "$target" ]]; then
              continue
            fi
            echo "Deploying $target"
            ./.github/scripts/run-bazel-ci.sh run --config=ci "$target"
          done < <(./.github/scripts/run-bazel-ci.sh run --config=ci //build/deploy:list_deploy_targets -- --kind "$DEPLOY_KIND")
      - name: Deploy web app targets
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
          DEPLOY_KIND: web_app
        run: |
          set -euo pipefail
          while IFS= read -r target; do
            if [[ -z "$target" ]]; then
              continue
            fi
            echo "Deploying $target"
            ./.github/scripts/run-bazel-ci.sh run --config=ci "$target"
          done < <(./.github/scripts/run-bazel-ci.sh run --config=ci //build/deploy:list_deploy_targets -- --kind "$DEPLOY_KIND")
      - name: Deploy Android app targets
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
          DEPLOY_KIND: android_app
        run: |
          set -euo pipefail
          while IFS= read -r target; do
            if [[ -z "$target" ]]; then
              continue
            fi
            echo "Deploying $target"
            ./.github/scripts/run-bazel-ci.sh run --config=ci "$target"
          done < <(./.github/scripts/run-bazel-ci.sh run --config=ci //build/deploy:list_deploy_targets -- --kind "$DEPLOY_KIND")
